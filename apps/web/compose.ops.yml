services:
  ops-worker:
    image: node:20
    working_dir: /workspace
    command: >
      sh -lc "npm ci && npm run prisma:generate && npm run ops:worker:daemon"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPS_ACTOR: docker-ops-worker
      OPS_WORKER_POLL_MS: ${OPS_WORKER_POLL_MS:-15000}
      OPS_WORKER_BATCH_SIZE: ${OPS_WORKER_BATCH_SIZE:-10}
      OPS_QUEUE_MAX_ATTEMPTS: ${OPS_QUEUE_MAX_ATTEMPTS:-3}
      OPS_QUEUE_BACKOFF_MS: ${OPS_QUEUE_BACKOFF_MS:-60000}
      OPS_ALERT_WEBHOOK_URL: ${OPS_ALERT_WEBHOOK_URL:-}
      OPS_ALERT_FALLBACK_WEBHOOK_URL: ${OPS_ALERT_FALLBACK_WEBHOOK_URL:-}
      OPS_ALERT_PAGER_WEBHOOK_URL: ${OPS_ALERT_PAGER_WEBHOOK_URL:-}
      OPS_ALERT_NOTIFY_ON_RECOVERY: ${OPS_ALERT_NOTIFY_ON_RECOVERY:-false}
      KOREA_MACRO_API_URL: ${KOREA_MACRO_API_URL:-}
      KOREA_MACRO_API_KEY: ${KOREA_MACRO_API_KEY:-}
      KOREA_BUILDING_API_URL: ${KOREA_BUILDING_API_URL:-}
      KOREA_BUILDING_API_KEY: ${KOREA_BUILDING_API_KEY:-}
      KOREA_ENERGY_API_URL: ${KOREA_ENERGY_API_URL:-}
      KOREA_ENERGY_API_KEY: ${KOREA_ENERGY_API_KEY:-}
      KOREA_GEOSPATIAL_API_URL: ${KOREA_GEOSPATIAL_API_URL:-}
      KOREA_GEOSPATIAL_API_KEY: ${KOREA_GEOSPATIAL_API_KEY:-}
      KOREA_KOSIS_API_KEY: ${KOREA_KOSIS_API_KEY:-}
      GLOBAL_MARKET_API_URL: ${GLOBAL_MARKET_API_URL:-}
      GLOBAL_MARKET_API_KEY: ${GLOBAL_MARKET_API_KEY:-}
      GLOBAL_MACRO_API_URL: ${GLOBAL_MACRO_API_URL:-}
      GLOBAL_MACRO_API_KEY: ${GLOBAL_MACRO_API_KEY:-}
    volumes:
      - .:/workspace
