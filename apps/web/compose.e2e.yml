services:
  postgres:
    image: postgres:16
    container_name: korea-re-ops-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: korea_dc_underwriting
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d korea_dc_underwriting']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data

volumes:
  postgres_e2e_data:
