services:
  postgres:
    # pgvector/pgvector:pg16 = stock Postgres 16 + the pgvector extension.
    # Required: migration 20260429140000_add_pgvector_and_ai_cache runs
    # `CREATE EXTENSION IF NOT EXISTS vector`, which fails on plain postgres:16
    # because the extension files are not installed in that image.
    image: pgvector/pgvector:pg16
    container_name: korea-re-ops-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: korea_dc_underwriting
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d korea_dc_underwriting']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data

volumes:
  postgres_e2e_data:
