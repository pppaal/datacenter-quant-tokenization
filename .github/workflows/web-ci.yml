name: web-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-checks:
    name: typecheck + tests + build + abi-drift + migration-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    services:
      postgres:
        # pgvector image so the `CREATE EXTENSION vector` migration (and the
        # HNSW index on DocumentEmbedding) applies during `migrate deploy`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_check"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_check
      ADMIN_SESSION_SECRET: ci-fixed-session-secret-32chars-1234
      OPS_CRON_TOKEN: ci-fixed-ops-cron-token
      APP_BASE_URL: https://ci.example.com
      BLOCKCHAIN_MOCK_MODE: "true"
      DOCUMENT_STORAGE_DIR: ./storage/documents
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Dependency vulnerability scan (high+ severity)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations against fresh CI Postgres
        run: npx prisma migrate deploy

      - name: Create shadow database for drift check
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE ci_shadow;"

      - name: Schema-migration drift guard
        run: |
          DIFF=$(npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "${DATABASE_URL/ci_check/ci_shadow}" \
            --script)
          # Prisma 5 cannot represent the pgvector HNSW index on the
          # Unsupported("vector(...)") column, so `migrate diff` always emits a
          # spurious DROP for DocumentEmbedding_embedding_hnsw_idx. Strip that one
          # known statement plus SQL comments/blank lines; ANY remaining
          # statement is real drift and fails the gate.
          RESIDUAL=$(printf '%s\n' "$DIFF" \
            | grep -vE '^\s*--' \
            | grep -vE 'DocumentEmbedding_embedding_hnsw_idx' \
            | grep -vE '^\s*$' || true)
          if [ -n "$RESIDUAL" ]; then
            echo "Unexpected schema drift:"
            echo "$RESIDUAL"
            exit 1
          fi
          echo "No schema drift (pgvector HNSW false-positive ignored)."

      - name: Registry ABI drift guard
        run: npx tsx scripts/check-registry-abi.ts

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Coverage report + ratcheting floor
        # Uses Node's BUILT-IN test coverage (no c8/nyc dependency). The full
        # suite measured 87.59% line coverage in CI on 2026-06-25 (the CI runner
        # attributes coverage over a broader file set than a local run); the
        # floor is set conservatively to 85 (rounded DOWN from the CI-measured
        # number) so it cannot fail today but blocks regressions. RATCHET UP as
        # coverage rises. Run `npm run test:coverage` locally to see the report.
        env:
          COVERAGE_LINE_FLOOR: "85"
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.txt
          # Node prints: "# all files | <line> | <branch> | <func> |"
          LINE_PCT=$(grep -E '# all files' coverage.txt \
            | tail -1 \
            | awk -F'|' '{gsub(/ /,"",$2); print $2}')
          if [ -z "$LINE_PCT" ]; then
            echo "Could not parse line coverage from report; failing closed."
            exit 1
          fi
          echo "Measured line coverage: ${LINE_PCT}% (floor: ${COVERAGE_LINE_FLOOR}%)"
          # Integer-truncated comparison avoids a bc dependency.
          if [ "${LINE_PCT%.*}" -lt "${COVERAGE_LINE_FLOOR}" ]; then
            echo "::error::Line coverage ${LINE_PCT}% is below floor ${COVERAGE_LINE_FLOOR}%"
            exit 1
          fi
          echo "Line coverage ${LINE_PCT}% meets floor ${COVERAGE_LINE_FLOOR}%."

      - name: Production build
        run: npm run build
