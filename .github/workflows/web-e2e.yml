name: web-e2e

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: korea_dc_underwriting
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d korea_dc_underwriting"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/korea_dc_underwriting?schema=public
      ADMIN_BASIC_AUTH_ADMIN_CREDENTIALS: admin@nexusseoul.local:secret
      ADMIN_SESSION_SECRET: ci-session-secret
      OPS_CRON_TOKEN: ci-ops-token
      BLOCKCHAIN_MOCK_MODE: "true"
      OPENAI_MODEL: gpt-4o-mini
      PORT: 3100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
