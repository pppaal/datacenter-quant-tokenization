name: contracts-ci

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
      - "apps/web/lib/blockchain/tokenization-abi.json"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "packages/contracts/**"
      - "apps/web/lib/blockchain/tokenization-abi.json"
      - ".github/workflows/contracts-ci.yml"

defaults:
  run:
    working-directory: packages/contracts

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (solhint)
        run: npm run lint
      - name: Compile
        run: npm run compile
      - name: Unit tests
        run: npm run test:unit
      - name: Tokenization ABI drift guard
        run: npm run check:tokenization-abi
      - name: Integration tests
        run: npm run test:integration
      - name: Script tests (verifier)
        run: npm run test:scripts
      - name: Property fuzz
        run: npm run test:fuzz
      - name: Invariant campaign
        run: npm run test:invariant
      - name: Gas budget regression
        run: npm run test:gas-baseline

  slither:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - name: Install node deps
        run: npm ci
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          target: packages/contracts/
          slither-config: packages/contracts/slither.config.json
          sarif: slither.sarif
          fail-on: medium
          node-version: 20
      - name: Upload SARIF to GitHub code scanning
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

  aderyn:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - name: Install node deps
        run: npm ci
      - name: Install Aderyn
        run: |
          curl -fsSL https://raw.githubusercontent.com/Cyfrin/aderyn/dev/cyfrinup/install | bash
          echo "$HOME/.cyfrin/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cyfrin/bin:$PATH"
          cyfrinup
      - name: Run Aderyn
        run: aderyn . --output report.md
      - name: Upload Aderyn report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-report
          path: packages/contracts/report.md

  smtchecker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - name: Install system solver
        run: sudo apt-get update && sudo apt-get install -y z3
      - name: Install node deps
        run: npm ci
      - name: Run SMTChecker (CHC + Z3)
        run: SMT=1 npx hardhat compile --force
